<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Tourism Careers</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <main class="container">
        <div class="main-grid">
            
            <!-- Top Row -->
            <a href="https://anywebsite.info" class="region-card">
                <div class="image-wrapper">
                    <img src="https://anywebsite.info/America1.png" alt="Americas">
                </div>
                <div class="card-content">
                    <h2>The Americas</h2>
                    <span class="cta-link">Explore Jobs &rarr;</span>
                </div>
            </a>

            <a href="http://anywebsite.info" class="region-card">
                <div class="image-wrapper">
                    <img src="https://anywebsite.info/Asia1.png" alt="Asia">
                </div>
                <div class="card-content">
                    <h2>Asia Pacific</h2>
                    <span class="cta-link">Explore Jobs &rarr;</span>
                </div>
            </a>

            <!-- Center Action Bar -->
            <div class="action-bar">
                <h2>Click-Any-Flag</h2>
                <a href="#" class="btn-about">About This</a>
            </div>

            <!-- Bottom Row -->
            <a href="http://anywebsite.info" class="region-card">
                <div class="image-wrapper">
                    <img src="https://anywebsite.info/Africa1.png" alt="Africa">
                </div>
                <div class="card-content">
                    <h2>Africa</h2>
                    <span class="cta-link">Explore Jobs &rarr;</span>
                </div>
            </a>

            <a href="http://anywebsite.info" class="region-card">
                <div class="image-wrapper">
                    <img src="https://anywebsite.info/Australia1.png" alt="Australia">
                </div>
                <div class="card-content">
                    <h2>Australia & Oceania</h2>
                    <span class="cta-link">Explore Jobs &rarr;</span>
                </div>
            </a>

        </div>
    </main>

</body>
</html>
